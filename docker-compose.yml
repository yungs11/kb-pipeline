# 8.kb-pipeline/docker-compose.yml
# Unified engine stack — Tasks 0-7 Dockerfiles wired together.
# Secrets stay in .env (gitignored). See .env.example for the full key catalog.
name: kbp
networks: { kbp: {} }
volumes: { eq_pg_data: {}, minio_data: {}, redis_data: {} }

services:
  # ---------------------------------------------------------------------------
  # Infrastructure tier
  # ---------------------------------------------------------------------------
  postgres:
    image: ghcr.io/raphaelmansuy/edgequake-postgres:latest
    environment:
      POSTGRES_USER: edgequake
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edgequake_secret}
      POSTGRES_DB: edgequake
    volumes: ["eq_pg_data:/var/lib/postgresql/data"]
    ports: ["5433:5432"]
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U edgequake"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [kbp]

  gotenberg:
    image: gotenberg/gotenberg:8
    networks: [kbp]
    healthcheck:
      # curl confirmed present in gotenberg/gotenberg:8
      test: ["CMD","curl","-fsS","http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes: ["minio_data:/data"]
    ports: ["19010:9000","19011:9001"]
    healthcheck:
      # curl confirmed present in minio/minio
      test: ["CMD","curl","-fsS","http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks: [kbp]

  redis:
    # document-parser stores VL model config/profiles in redis (core/config/model_profiles.py);
    # without a reachable redis its /health hangs → depends_on chain (parse-svc→facade) deadlocks.
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes: ["redis_data:/data"]
    networks: [kbp]
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  # ---------------------------------------------------------------------------
  # Knowledge-graph / vector engine
  # ---------------------------------------------------------------------------
  edgequake:
    build: { context: ., dockerfile: docker/edgequake.Dockerfile }
    environment:
      DATABASE_URL: postgres://edgequake:${POSTGRES_PASSWORD:-edgequake_secret}@postgres:5432/edgequake
      EDGEQUAKE_CHUNKER: passthrough
      EDGEQUAKE_LLM_PROVIDER: openrouter
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      # HOST/PORT (not EDGEQUAKE_HOST/EDGEQUAKE_PORT) — edgequake main.rs reads these
      HOST: 0.0.0.0
      PORT: "8081"
      EDGEQUAKE_DEFAULT_LLM_MODEL: qwen/qwen3.5-122b-a10b
      EDGEQUAKE_LLM_MODEL: qwen/qwen3.5-122b-a10b   # prevents COMPAT-GUARD downgrade bug
      EDGEQUAKE_EMBEDDING_PROVIDER: openai
      EDGEQUAKE_EMBEDDING_BASE_URL: ${LITELLM_EMBEDDING_BASE_URL}
      EDGEQUAKE_EMBEDDING_API_KEY: ${LITELLM_EMBEDDING_API_KEY}
      EDGEQUAKE_EMBEDDING_MODEL: bge-m3
      EDGEQUAKE_EMBEDDING_DIMENSION: "1024"
      PDFIUM_AUTO_CACHE_DIR: /tmp/eqkbp-pdfium
    depends_on: { postgres: { condition: service_healthy } }
    ports: ["8081:8081"]
    healthcheck:
      test: ["CMD","curl","-fsS","http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [kbp]

  # ---------------------------------------------------------------------------
  # Document processing tier
  # ---------------------------------------------------------------------------
  document-parser:
    # Dockerfile.aws: correct file. The plain Dockerfile references a nonexistent path.
    # build context: one level up from 8.kb-pipeline/ (sibling repo)
    build:
      context: ../99.projects/jiju_chaekmu/sourceCode/document-parser-backend-src
      dockerfile: Dockerfile.aws
    environment:
      GOTENBERG_URL: http://gotenberg:3000
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_ENABLED: "true"   # loader.py reads MINIO_ENABLED (default False) — must be true
      MINIO_BUCKET: ${MINIO_BUCKET:-document-parser}   # core/config/loader.py default='document-parser'
      MODEL_API_URL: ${MODEL_API_URL}
      MODEL_API_KEY: ${MODEL_API_KEY}
      # REDIS_HOST: config_manager/model_profiles read VL model config from redis (loader.py:240 default 'localhost').
      # Point at the compose redis service; without it /health hangs (Error 111 localhost:6379).
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # MAX_CONCURRENT_REQUESTS=1: per-process asyncio.Semaphore(1) in main.py — total concurrency = workers(3) × 1
      MAX_CONCURRENT_REQUESTS: "1"
    depends_on:
      gotenberg: { condition: service_healthy }
      minio: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports: ["18050:8000"]
    healthcheck:
      # /health = readiness (verifies gotenberg connectivity). document-parser image has curl.
      # Compose HEALTHCHECK overrides the image's built-in HEALTHCHECK.
      test: ["CMD","curl","-fsS","http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 20
    networks: [kbp]

  excel-parser:
    # build context: one level up from 8.kb-pipeline/ (sibling repo)
    build: { context: ../7.excel-parser }
    environment:
      EXCEL_PARSER_BACKEND: auto
      KORDOC_BIN: kordoc
    ports: ["18055:18055"]   # Task 9 regression tests use host curl
    networks: [kbp]   # parse-svc + facade route to http://excel-parser:18055
    healthcheck:
      test: ["CMD","curl","-fsS","http://localhost:18055/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12

  doc_guard:
    # build context: one level up from 8.kb-pipeline/ (sibling repo)
    build: { context: ../99.projects/shinhan_trust/doc_guard }
    networks: [kbp]
    ports: ["8001:8000"]   # host:8001 → container:8000
    healthcheck:
      test: ["CMD","curl","-fsS","http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12

  adaptive_chunk:
    # build context: one level up from 8.kb-pipeline/ (sibling repo)
    build: { context: ../99.projects/adaptive_chunk }
    environment:
      # pydantic-settings env_prefix="ADAPTIVE_CHUNK_" — no env_file: to avoid leaking all secrets.
      # Each key is listed explicitly. See .env.example for guidance on container-internal URLs.
      ADAPTIVE_CHUNK_OPENROUTER_API_KEY: ${ADAPTIVE_CHUNK_OPENROUTER_API_KEY}
      ADAPTIVE_CHUNK_OPENROUTER_BASE_URL: ${ADAPTIVE_CHUNK_OPENROUTER_BASE_URL}
      ADAPTIVE_CHUNK_SCORING_EMBEDDING_MODEL: ${ADAPTIVE_CHUNK_SCORING_EMBEDDING_MODEL}
      ADAPTIVE_CHUNK_SCORING_EMBEDDING_BASE_URL: ${ADAPTIVE_CHUNK_SCORING_EMBEDDING_BASE_URL}
      ADAPTIVE_CHUNK_SCORING_EMBEDDING_API_KEY: ${ADAPTIVE_CHUNK_SCORING_EMBEDDING_API_KEY}
      ADAPTIVE_CHUNK_SCORING_EMBEDDING_TIMEOUT_S: ${ADAPTIVE_CHUNK_SCORING_EMBEDDING_TIMEOUT_S}
      ADAPTIVE_CHUNK_REGEX_LLM_MODEL: ${ADAPTIVE_CHUNK_REGEX_LLM_MODEL}
      # OCR backend: hard-coded to intra-stack service DNS (host localhost:18050 unreachable in container)
      ADAPTIVE_CHUNK_OCR_BASE_URL: http://document-parser:8000
      # ADAPTIVE_CHUNK_QDRANT_URL 제거(2026-07-01): 벡터 적재는 edgequake(pgvector) 소유,
      # adaptive_chunk 는 Qdrant 미소비(config placeholder). SoT.md §9 참조.
      ADAPTIVE_CHUNK_EDGEQUAKE_BASE_URL: ${ADAPTIVE_CHUNK_EDGEQUAKE_BASE_URL}
      ADAPTIVE_CHUNK_JOB_TIMEOUT_S: ${ADAPTIVE_CHUNK_JOB_TIMEOUT_S}
      ADAPTIVE_CHUNK_RERANK_MODEL: ${ADAPTIVE_CHUNK_RERANK_MODEL}
      ADAPTIVE_CHUNK_RERANK_BASE_URL: ${ADAPTIVE_CHUNK_RERANK_BASE_URL}
      ADAPTIVE_CHUNK_RERANK_API_KEY: ${ADAPTIVE_CHUNK_RERANK_API_KEY}
      ADAPTIVE_CHUNK_COREF_LLM_MODEL: ${ADAPTIVE_CHUNK_COREF_LLM_MODEL}
      ADAPTIVE_CHUNK_COREF_REASONING: ${ADAPTIVE_CHUNK_COREF_REASONING}
    depends_on:
      document-parser: { condition: service_healthy }   # ADAPTIVE_CHUNK_OCR_BASE_URL points here
    networks: [kbp]
    healthcheck:
      test: ["CMD","curl","-fsS","http://localhost:18060/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12

  # ---------------------------------------------------------------------------
  # KB-pipeline application tier
  # ---------------------------------------------------------------------------
  parse-svc:
    build: { context: ., dockerfile: Dockerfile.parse-svc }
    environment:
      KBP_OPENAI_API_KEY: ${KBP_OPENAI_API_KEY}
      KBP_OPENAI_BASE_URL: ${KBP_OPENAI_BASE_URL}
      KBP_LLM_MODEL: ${KBP_LLM_MODEL}
      KBP_OCR_URL: http://document-parser:8000
      KBP_EXCEL_URL: http://excel-parser:18055
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-document-parser}
      MINIO_SECURE: "false"
    depends_on:
      excel-parser: { condition: service_healthy }
      document-parser: { condition: service_healthy }
    ports: ["19001:19001"]
    healthcheck:
      test: ["CMD","curl","-fsS","http://localhost:19001/healthz"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [kbp]

  facade:
    build: { context: ., dockerfile: Dockerfile.facade }
    environment:
      KBP_PARSE_SVC_URL: http://parse-svc:19001
      KBP_ADAPTIVE_CHUNK_URL: http://adaptive_chunk:18060
      KBP_EDGEQUAKE_URL: http://edgequake:8081
      KBP_PG_DSN: postgres://edgequake:${POSTGRES_PASSWORD:-edgequake_secret}@postgres:5432/edgequake
      KBP_OPENAI_API_KEY: ${KBP_OPENAI_API_KEY}
      KBP_OPENAI_BASE_URL: ${KBP_OPENAI_BASE_URL}
      KBP_LLM_MODEL: ${KBP_LLM_MODEL}
      # facade /ingest/submit reads KBP_EXCEL_URL + KBP_OCR_URL (default localhost → unreachable)
      KBP_EXCEL_URL: http://excel-parser:18055
      KBP_OCR_URL: http://document-parser:8000
    depends_on:
      parse-svc: { condition: service_healthy }
      adaptive_chunk: { condition: service_healthy }
      edgequake: { condition: service_healthy }
    ports: ["19000:19000"]
    healthcheck:
      test: ["CMD","curl","-fsS","http://localhost:19000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [kbp]
